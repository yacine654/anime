<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سكورا — اكتشف الأنمي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0A0A0F;
    --surface: #12121E;
    --card: #1A1A2E;
    --border: #2A2A45;
    --violet: #7C3AED;
    --violet-glow: rgba(124, 58, 237, 0.35);
    --pink: #EC4899;
    --pink-glow: rgba(236, 72, 153, 0.3);
    --cyan: #06B6D4;
    --text: #F8F6FF;
    --muted: #8B8BAA;
    --tag-bg: rgba(124, 58, 237, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--void);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    direction: rtl;
  }

  /* HEADER */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10, 10, 15, 0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-family: 'Cairo', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  nav { display: flex; gap: 0.25rem; flex-direction: row-reverse; }

  nav button {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }

  nav button:hover, nav button.active {
    color: var(--text);
    background: rgba(124, 58, 237, 0.12);
  }

  nav button.active { color: var(--violet); }

  /* HERO */
  .hero {
    padding: 5rem 2rem 3rem;
    text-align: center;
    position: relative;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,58,237,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Cairo', sans-serif;
    font-size: clamp(2rem, 5vw, 3.6rem);
    font-weight: 900;
    line-height: 1.25;
    margin-bottom: 0.75rem;
  }

  .hero h1 span {
    background: linear-gradient(135deg, var(--violet), var(--pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 2rem;
    font-weight: 300;
  }

  /* SEARCH */
  .search-wrap {
    display: flex;
    flex-direction: row-reverse;
    max-width: 560px;
    margin: 0 auto 1.5rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-wrap:focus-within {
    border-color: var(--violet);
    box-shadow: 0 0 0 3px var(--violet-glow);
  }

  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.95rem;
    padding: 0.8rem 1rem;
    text-align: right;
    direction: rtl;
  }

  #search-input::placeholder { color: var(--muted); }

  #search-btn {
    background: linear-gradient(135deg, var(--violet), var(--pink));
    border: none;
    color: #fff;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 0.8rem 1.4rem;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  #search-btn:hover { opacity: 0.88; }

  /* TABS */
  .tabs {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    flex-direction: row-reverse;
  }

  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.4rem 1rem;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover { border-color: var(--violet); color: var(--text); }
  .tab-btn.active {
    background: var(--violet);
    border-color: var(--violet);
    color: #fff;
    box-shadow: 0 0 12px var(--violet-glow);
  }

  /* SECTION */
  .section {
    padding: 0 2rem 4rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-direction: row-reverse;
    justify-content: flex-end;
  }

  .section-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--text);
  }

  .section-pill {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    background: var(--pink-glow);
    color: var(--pink);
    border: 1px solid rgba(236,72,153,0.3);
  }

  /* GRID */
  .anime-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.25rem;
  }

  /* CARD */
  .anime-card {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
    position: relative;
  }

  .anime-card:hover {
    transform: translateY(-6px) scale(1.01);
    border-color: var(--violet);
    box-shadow: 0 12px 40px rgba(124,58,237,0.25), 0 2px 8px rgba(0,0,0,0.5);
  }

  .card-img-wrap {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
  }

  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.35s;
    display: block;
  }

  .anime-card:hover .card-img-wrap img { transform: scale(1.06); }

  .card-score {
    position: absolute;
    top: 8px; left: 8px;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(6px);
    color: #FFD700;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.25rem 0.5rem;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    border: 1px solid rgba(255,215,0,0.2);
    font-family: 'Inter', sans-serif;
  }

  .card-type {
    position: absolute;
    top: 8px; right: 8px;
    background: linear-gradient(135deg, var(--violet), var(--pink));
    color: #fff;
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,15,0.95) 0%, transparent 55%);
    opacity: 0;
    transition: opacity 0.25s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0.75rem;
    gap: 0.4rem;
  }

  .anime-card:hover .card-overlay { opacity: 1; }

  .overlay-episodes {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    text-align: right;
  }

  .overlay-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    justify-content: flex-end;
  }

  .genre-tag {
    font-size: 0.62rem;
    font-weight: 700;
    padding: 0.15rem 0.45rem;
    border-radius: 3px;
    background: var(--tag-bg);
    color: #A78BFA;
    border: 1px solid rgba(124,58,237,0.25);
    font-family: 'Cairo', sans-serif;
  }

  .card-info {
    padding: 0.7rem 0.75rem 0.8rem;
    text-align: right;
  }

  .card-title {
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-year {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 0.2rem;
    font-family: 'Inter', sans-serif;
  }

  /* SKELETON */
  .skeleton {
    background: var(--card);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    animation: pulse 1.6s ease-in-out infinite;
  }

  .skeleton-img { aspect-ratio: 3/4; background: var(--surface); }
  .skeleton-info { padding: 0.7rem 0.75rem; }
  .skeleton-line {
    height: 12px;
    border-radius: 4px;
    background: var(--border);
    margin-bottom: 0.5rem;
  }
  .skeleton-line.short { width: 55%; margin-right: auto; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* MODAL */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.88);
    backdrop-filter: blur(12px);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 1rem; left: 1rem;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
    z-index: 10;
  }

  .modal-close:hover { color: var(--text); background: rgba(255,255,255,0.1); }

  .modal-inner {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0;
    direction: rtl;
  }

  .modal-poster {
    width: 200px;
    min-height: 280px;
    object-fit: cover;
    border-radius: 14px 0 0 14px;
    display: block;
    order: 2;
  }

  .modal-body {
    padding: 1.75rem 1.5rem 1.5rem;
    text-align: right;
    order: 1;
  }

  .modal-type-row {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 0.75rem;
    flex-direction: row-reverse;
    justify-content: flex-start;
  }

  .modal-badge {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
  }

  .badge-type { background: linear-gradient(135deg, var(--violet), var(--pink)); color: #fff; }
  .badge-status {
    background: rgba(6,182,212,0.12);
    color: var(--cyan);
    border: 1px solid rgba(6,182,212,0.25);
  }

  .modal-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    line-height: 1.25;
    margin-bottom: 0.3rem;
  }

  .modal-title-en {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.9rem;
    font-weight: 300;
    font-family: 'Inter', sans-serif;
    text-align: left;
    direction: ltr;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.55rem 0.6rem;
    text-align: center;
  }

  .stat-val {
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    color: var(--text);
  }

  .stat-val.gold { color: #FFD700; }

  .stat-label {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.1rem;
    font-family: 'Cairo', sans-serif;
    font-weight: 600;
  }

  .modal-synopsis {
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.75;
    margin-bottom: 0.9rem;
    font-weight: 400;
    direction: ltr;
    text-align: left;
  }

  .modal-genres { display: flex; flex-wrap: wrap; gap: 0.35rem; justify-content: flex-end; }

  /* EMPTY / ERROR */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 0.75rem; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; font-family: 'Cairo', sans-serif; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 0.82rem;
    font-weight: 400;
    font-family: 'Cairo', sans-serif;
  }

  footer a { color: var(--violet); text-decoration: none; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .modal-inner { grid-template-columns: 1fr; }
    .modal-poster { width: 100%; min-height: 240px; border-radius: 14px 14px 0 0; order: 1; }
    .modal-body { order: 2; }
    nav { display: none; }
    .anime-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }

  @media (prefers-reduced-motion: reduce) {
    .anime-card, .card-img-wrap img { transition: none; }
  }

  /* ── WATCH PAGE ── */
  #watch-page {
    display: none;
    flex-direction: column;
    min-height: 100vh;
  }

  #watch-page.open { display: flex; }

  .watch-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-direction: row-reverse;
  }

  .watch-back {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.35rem 0.85rem 0.35rem 0.6rem;
    border-radius: 7px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    flex-shrink: 0;
    flex-direction: row-reverse;
  }

  .watch-back:hover {
    color: var(--text);
    border-color: var(--violet);
    background: rgba(124,58,237,0.1);
  }

  .watch-back svg { width: 14px; height: 14px; transform: scaleX(-1); }

  .watch-title-bar {
    font-family: 'Cairo', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    flex: 1;
    text-align: right;
  }

  .watch-ep-badge {
    margin-right: auto;
    margin-left: 0;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0.25rem 0.65rem;
    border-radius: 5px;
    background: rgba(124,58,237,0.15);
    color: #A78BFA;
    border: 1px solid rgba(124,58,237,0.25);
    flex-shrink: 0;
    font-family: 'Cairo', sans-serif;
  }

  .watch-body {
    display: grid;
    grid-template-columns: 320px 1fr;
    flex: 1;
    min-height: 0;
  }

  .watch-main {
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
    order: 2;
  }

  .player-shell {
    position: relative;
    background: #000;
    aspect-ratio: 16/9;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .player-bg-art {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: blur(32px) brightness(0.18) saturate(1.4);
    transform: scale(1.1);
    transition: background-image 0.6s;
  }

  .throbber-wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }

  .throbber {
    position: relative;
    width: 64px;
    height: 64px;
  }

  .throbber-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid transparent;
    animation: spin 1.1s linear infinite;
  }

  .throbber-ring:nth-child(1) { border-top-color: var(--violet); animation-duration: 1.1s; }
  .throbber-ring:nth-child(2) { inset: 8px; border-top-color: var(--pink); animation-duration: 0.75s; animation-direction: reverse; }
  .throbber-ring:nth-child(3) { inset: 18px; border-top-color: rgba(124,58,237,0.4); animation-duration: 1.6s; }

  .throbber-dot {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 6px; height: 6px;
    background: var(--violet);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--violet), 0 0 20px var(--violet-glow);
    animation: dotpulse 2s ease-in-out infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes dotpulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--violet), 0 0 16px var(--violet-glow); }
    50% { opacity: 0.5; box-shadow: 0 0 4px var(--violet); }
  }

  .throbber-status {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 400;
    animation: statuscycle 4s ease-in-out infinite;
    font-family: 'Cairo', sans-serif;
  }

  @keyframes statuscycle {
    0%   { opacity: 1; }
    45%  { opacity: 1; }
    50%  { opacity: 0; }
    95%  { opacity: 0; }
    100% { opacity: 1; }
  }

  .player-controls {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 3;
    padding: 0.75rem 1rem;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    direction: ltr;
  }

  .ctrl-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    padding: 0.25rem;
    border-radius: 5px;
    display: flex;
    align-items: center;
    transition: color 0.15s;
  }
  .ctrl-btn:hover { color: #fff; }
  .ctrl-btn svg { width: 18px; height: 18px; }

  .ctrl-progress {
    flex: 1;
    height: 3px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    cursor: pointer;
    overflow: hidden;
  }

  .ctrl-progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--violet), var(--pink));
    border-radius: 2px;
    animation: buffering 3s ease-in-out infinite;
  }

  @keyframes buffering {
    0% { width: 0%; opacity: 1; }
    60% { width: 35%; opacity: 1; }
    80% { width: 35%; opacity: 0.5; }
    100% { width: 0%; opacity: 0; }
  }

  .ctrl-time {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    font-family: 'Inter', sans-serif;
  }

  .watch-info {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    text-align: right;
  }

  .watch-anime-title {
    font-family: 'Cairo', sans-serif;
    font-size: 1.35rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
  }

  .watch-meta-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    flex-direction: row-reverse;
  }

  .watch-meta-row .modal-badge { font-size: 0.62rem; }

  .watch-score {
    font-size: 0.8rem;
    color: #FFD700;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
  }

  .watch-sep { color: var(--border); }

  .watch-source-note {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 400;
    font-family: 'Cairo', sans-serif;
  }

  .ep-panel {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    order: 1;
    border-right: 1px solid var(--border);
  }

  .ep-panel-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 900;
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-direction: row-reverse;
    flex-shrink: 0;
  }

  .ep-count-badge {
    font-family: 'Cairo', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--border);
    padding: 0.2rem 0.55rem;
    border-radius: 4px;
  }

  .ep-list {
    overflow-y: auto;
    flex: 1;
    padding: 0.5rem 0;
  }

  .ep-list::-webkit-scrollbar { width: 4px; }
  .ep-list::-webkit-scrollbar-track { background: transparent; }
  .ep-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ep-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    transition: background 0.15s;
    border-right: 2px solid transparent;
    flex-direction: row-reverse;
  }

  .ep-item:hover { background: rgba(124,58,237,0.07); }

  .ep-item.active {
    background: rgba(124,58,237,0.12);
    border-right-color: var(--violet);
  }

  .ep-num {
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 28px;
    text-align: center;
    flex-shrink: 0;
  }

  .ep-item.active .ep-num { color: var(--violet); }

  .ep-thumb {
    width: 88px;
    height: 52px;
    background: var(--card);
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }

  .ep-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;
  }

  .ep-playing-indicator {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    background: rgba(124,58,237,0.5);
  }

  .ep-item.active .ep-playing-indicator { display: flex; }

  .ep-playing-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
  }

  .ep-playing-bars span {
    display: block;
    width: 3px;
    background: #fff;
    border-radius: 1px;
    animation: bars 0.8s ease-in-out infinite alternate;
  }

  .ep-playing-bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .ep-playing-bars span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .ep-playing-bars span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .ep-playing-bars span:nth-child(4) { height: 16px; animation-delay: 0.1s; }

  @keyframes bars {
    from { transform: scaleY(0.4); }
    to   { transform: scaleY(1); }
  }

  .ep-details { flex: 1; min-width: 0; text-align: right; }

  .ep-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: 'Cairo', sans-serif;
  }

  .ep-item.active .ep-title { color: #A78BFA; }

  .ep-duration {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 0.15rem;
    font-family: 'Inter', sans-serif;
  }

  .watch-below-mobile { display: none; }

  @media (max-width: 768px) {
    .watch-body { grid-template-columns: 1fr; }
    .ep-panel { display: none; }
    .watch-suggestions { display: none; }
    .watch-below-mobile { display: block; }
  }

  /* SUGGESTIONS (desktop) */
  .watch-suggestions {
    padding: 1.25rem 1.5rem;
    overflow-y: auto;
    border-top: 1px solid var(--border);
  }

  .watch-suggestions::-webkit-scrollbar { width: 4px; }
  .watch-suggestions::-webkit-scrollbar-track { background: transparent; }
  .watch-suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .suggestions-label {
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 0.85rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-direction: row-reverse;
    justify-content: flex-end;
  }

  .suggestions-label::before {
    content: '';
    display: block;
    width: 3px; height: 14px;
    background: linear-gradient(to bottom, var(--violet), var(--pink));
    border-radius: 2px;
    flex-shrink: 0;
  }

  .suggestions-grid {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .suggestion-card {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.5rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    flex-direction: row-reverse;
  }

  .suggestion-card:hover {
    border-color: var(--violet);
    background: rgba(124,58,237,0.07);
  }

  .suggestion-thumb {
    width: 70px;
    height: 42px;
    border-radius: 5px;
    overflow: hidden;
    flex-shrink: 0;
    background: var(--surface);
  }

  .suggestion-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .suggestion-info { flex: 1; min-width: 0; text-align: right; }

  .suggestion-title {
    font-family: 'Cairo', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.2rem;
  }

  .suggestion-meta {
    font-size: 0.68rem;
    color: var(--muted);
    display: flex;
    gap: 0.4rem;
    align-items: center;
    justify-content: flex-end;
  }

  .suggestion-score { color: #FFD700; font-family: 'Inter', sans-serif; }

  /* MOBILE below-player tabs */
  .mobile-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-direction: row-reverse;
  }

  .mobile-tab {
    flex: 1;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 0.75rem 0;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    margin-bottom: -1px;
  }

  .mobile-tab.active { color: var(--violet); border-bottom-color: var(--violet); }

  .mobile-panel { display: none; }
  .mobile-panel.active { display: block; }

  .mobile-ep-list { padding: 0.5rem 0; }

  .mobile-suggestions-wrap {
    padding: 0.75rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }
</style>
</head>
<body>

<header>
  <div class="logo">桜 سكورا</div>
  <nav>
    <button class="active" onclick="setSection('trending', this)">الرائج</button>
    <button onclick="setSection('seasonal', this)">هذا الموسم</button>
    <button onclick="setSection('top', this)">الأعلى تقييماً</button>
    <button onclick="setSection('upcoming', this)">قادم قريباً</button>
  </nav>
</header>

<div class="hero">
  <h1>اكتشف <span>الأنمي</span><br>الذي يستحق المشاهدة</h1>
  <p>المسلسلات الرائجة، والكلاسيكيات الأعلى تقييماً، وما يُعرض الآن.</p>
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="ابحث عن أي أنمي..." autocomplete="off" />
    <button id="search-btn">بحث</button>
  </div>
  <div class="tabs" id="filter-tabs">
    <button class="tab-btn active" onclick="filterType('', this)">الكل</button>
    <button class="tab-btn" onclick="filterType('tv', this)">مسلسلات TV</button>
    <button class="tab-btn" onclick="filterType('movie', this)">أفلام</button>
    <button class="tab-btn" onclick="filterType('ova', this)">OVA</button>
    <button class="tab-btn" onclick="filterType('special', this)">خاص</button>
  </div>
</div>

<main class="section">
  <div class="section-header">
    <span class="section-title" id="section-label">الرائج الآن</span>
    <span class="section-pill" id="section-pill">مباشر</span>
  </div>
  <div class="anime-grid" id="anime-grid"></div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-inner" id="modal-content"></div>
  </div>
</div>

<footer>
  البيانات من <a href="https://jikan.moe" target="_blank">Jikan API</a> (MyAnimeList) &nbsp;·&nbsp; سكورا مشروع من صنع المعجبين
</footer>

<!-- WATCH PAGE -->
<div id="watch-page">
  <div class="watch-header">
    <button class="watch-back" onclick="closeWatch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      رجوع
    </button>
    <div class="watch-title-bar" id="watch-title-bar">—</div>
    <div class="watch-ep-badge" id="watch-ep-badge">الحلقة ١</div>
  </div>

  <div class="watch-body">
    <div class="watch-main">
      <div class="player-shell">
        <div class="player-bg-art" id="player-bg-art"></div>
        <div class="throbber-wrap">
          <div class="throbber">
            <div class="throbber-ring"></div>
            <div class="throbber-ring"></div>
            <div class="throbber-ring"></div>
            <div class="throbber-dot"></div>
          </div>
          <div class="throbber-status" id="throbber-status">جارٍ الاتصال بالبث…</div>
        </div>
        <div class="player-controls">
          <button class="ctrl-btn" title="السابق">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn" title="تشغيل/إيقاف">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="ctrl-btn" title="التالي">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="m6 18 8.5-6L6 6v12zm2.5-6 8.5 6V6z"/></svg>
          </button>
          <div class="ctrl-progress"><div class="ctrl-progress-fill"></div></div>
          <div class="ctrl-time">0:00 / —:—</div>
          <button class="ctrl-btn" title="ملء الشاشة">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
          </button>
        </div>
      </div>

      <div class="watch-info">
        <div class="watch-anime-title" id="watch-anime-title">—</div>
        <div class="watch-meta-row">
          <span class="modal-badge badge-type" id="watch-type-badge"></span>
          <span class="watch-score" id="watch-score"></span>
          <span class="watch-sep">·</span>
          <span class="watch-source-note">بث عبر سكورا · مشروع معجبين</span>
        </div>
      </div>

      <div class="watch-suggestions" id="watch-suggestions">
        <div class="suggestions-label">أنميات مقترحة</div>
        <div class="suggestions-grid" id="suggestions-grid"></div>
      </div>

      <div class="watch-below-mobile">
        <div class="mobile-tabs">
          <button class="mobile-tab active" onclick="setMobileTab('episodes', this)">الحلقات</button>
          <button class="mobile-tab" onclick="setMobileTab('suggestions', this)">مقترحات</button>
        </div>
        <div class="mobile-panel active" id="mobile-panel-episodes">
          <div class="mobile-ep-list" id="mobile-ep-list"></div>
        </div>
        <div class="mobile-panel" id="mobile-panel-suggestions">
          <div class="mobile-suggestions-wrap" id="mobile-suggestions-grid"></div>
        </div>
      </div>
    </div>

    <div class="ep-panel">
      <div class="ep-panel-header">
        الحلقات
        <span class="ep-count-badge" id="ep-count-badge">—</span>
      </div>
      <div class="ep-list" id="ep-list"></div>
    </div>
  </div>
</div>

<script>
  const BASE = 'https://api.jikan.moe/v4';
  const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';
  
  // Alternative: use direct API without proxy if available
  const API_BASE = 'https://api.consumet.org';
  let currentSection = 'trending';
  let currentType = '';
  let allCards = [];

  const endpoints = {
    trending: '/top/anime?filter=airing',
    seasonal: '/seasons/now',
    top: '/top/anime',
    upcoming: '/seasons/upcoming'
  };

  const labels = {
    trending: ['الرائج الآن', 'مباشر'],
    seasonal: ['هذا الموسم', 'يُعرض الآن'],
    top: ['الأعلى تقييماً', 'كل الأوقات'],
    upcoming: ['قادم قريباً', 'قريباً']
  };

  function toArabicNum(n) {
    return n.toString().replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
  }

  function skeleton() {
    return Array.from({length: 20}, () => `
      <div class="skeleton">
        <div class="skeleton-img"></div>
        <div class="skeleton-info">
          <div class="skeleton-line"></div>
          <div class="skeleton-line short"></div>
        </div>
      </div>`).join('');
  }

  async function fetchAnime(section) {
    const grid = document.getElementById('anime-grid');
    grid.innerHTML = skeleton();
    try {
      const res = await fetch(BASE + endpoints[section] + (currentType ? `&type=${currentType}` : ''));
      const json = await res.json();
      const data = json.data || [];
      allCards = data;
      renderCards(data);
    } catch(e) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚡</div><p>تعذّر تحميل البيانات. حاول مجدداً.</p></div>`;
    }
  }

  function renderCards(data) {
    const grid = document.getElementById('anime-grid');
    if (!data.length) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">🔍</div><p>لا توجد نتائج.</p></div>`;
      return;
    }
    grid.innerHTML = data.map(a => `
      <div class="anime-card" onclick="openModal(${a.mal_id})">
        <div class="card-img-wrap">
          <img src="${a.images?.webp?.image_url || a.images?.jpg?.image_url || ''}" alt="${esc(a.title)}" loading="lazy" />
          ${a.score ? `<div class="card-score">★ ${a.score}</div>` : ''}
          ${a.type ? `<div class="card-type">${a.type}</div>` : ''}
          <div class="card-overlay">
            ${a.episodes ? `<div class="overlay-episodes">${toArabicNum(a.episodes)} حلقة</div>` : ''}
            <div class="overlay-genres">
              ${(a.genres||[]).slice(0,3).map(g=>`<span class="genre-tag">${g.name}</span>`).join('')}
            </div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title" title="${esc(a.title)}">${esc(a.title)}</div>
          <div class="card-year">${a.year || (a.aired?.prop?.from?.year) || '—'}</div>
        </div>
      </div>`).join('');
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let currentAnimeData = null;

  async function openModal(id) {
    document.getElementById('modal-backdrop').classList.add('open');
    document.getElementById('modal-content').innerHTML = `<div style="padding:2rem;color:var(--muted);font-size:.9rem;font-family:'Cairo',sans-serif;">جارٍ التحميل...</div>`;
    try {
      const res = await fetch(`${BASE}/anime/${id}`);
      const json = await res.json();
      const a = json.data;
      currentAnimeData = a;
      const synopsis = a.synopsis ? a.synopsis.replace(/\[Written by MAL Rewrite\]/g,'').trim() : 'لا يوجد ملخص متاح.';
      document.getElementById('modal-content').innerHTML = `
        <img class="modal-poster" src="${a.images?.webp?.large_image_url || a.images?.jpg?.large_image_url || ''}" alt="${esc(a.title)}" />
        <div class="modal-body">
          <div class="modal-type-row">
            ${a.type ? `<span class="modal-badge badge-type">${a.type}</span>` : ''}
            ${a.status ? `<span class="modal-badge badge-status">${a.status}</span>` : ''}
          </div>
          <div class="modal-title">${esc(a.title)}</div>
          <div class="modal-title-en">${a.title_english && a.title_english !== a.title ? esc(a.title_english) : ''}</div>
          <div class="modal-stats">
            <div class="stat-box"><div class="stat-val gold">${a.score || '—'}</div><div class="stat-label">التقييم</div></div>
            <div class="stat-box"><div class="stat-val">${a.episodes ? toArabicNum(a.episodes) : '?'}</div><div class="stat-label">الحلقات</div></div>
            <div class="stat-box"><div class="stat-val">#${a.rank || '—'}</div><div class="stat-label">الترتيب</div></div>
          </div>
          <p class="modal-synopsis">${esc(synopsis.slice(0, 420))}${synopsis.length > 420 ? '…' : ''}</p>
          <div class="modal-genres" style="margin-bottom:1rem;">
            ${(a.genres||[]).map(g=>`<span class="genre-tag">${g.name}</span>`).join('')}
            ${(a.themes||[]).map(g=>`<span class="genre-tag" style="color:#67E8F9;border-color:rgba(6,182,212,.25);background:rgba(6,182,212,.1)">${g.name}</span>`).join('')}
          </div>
          <button onclick="openWatch()" style="
            background: linear-gradient(135deg,var(--violet),var(--pink));
            border: none; color: #fff;
            font-family: 'Cairo',sans-serif; font-weight:700; font-size:1rem;
            padding:0.65rem 1.4rem;
            border-radius:8px; cursor:pointer; display:flex; align-items:center; gap:0.5rem;
            transition:opacity 0.2s; width:100%; justify-content:center;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            شاهد الآن
          </button>
        </div>`;
    } catch(e) {
      document.getElementById('modal-content').innerHTML = `<div style="padding:2rem;color:var(--muted);font-family:'Cairo',sans-serif;">فشل تحميل التفاصيل.</div>`;
    }
  }

  // ── WATCH PAGE ──
  const statusMessages = [
    'جارٍ الاتصال بالبث…',
    'جارٍ تحميل بيانات الحلقة…',
    'جارٍ التخزين المؤقت…',
    'لحظة من فضلك…',
    'جارٍ تحميل الترجمة…',
    'جارٍ إنشاء الاتصال…',
  ];

  let statusIdx = 0;
  let statusInterval = null;

  function cycleStatus() {
    statusIdx = (statusIdx + 1) % statusMessages.length;
    const el = document.getElementById('throbber-status');
    if (el) el.textContent = statusMessages[statusIdx];
  }

  async function openWatch(ep = 1) {
    if (!currentAnimeData) return;
    const a = currentAnimeData;

    // Hide main page
    document.getElementById('modal-backdrop').classList.remove('open');
    document.querySelector('header').style.display = 'none';
    document.querySelector('.hero').style.display = 'none';
    document.querySelector('main.section').style.display = 'none';
    document.querySelector('footer').style.display = 'none';

    const watchPage = document.getElementById('watch-page');
    watchPage.classList.add('open');

    document.getElementById('watch-title-bar').textContent = a.title;
    document.getElementById('watch-ep-badge').textContent = `الحلقة ${toArabicNum(ep)}`;

    const imgUrl = a.images?.webp?.large_image_url || a.images?.jpg?.large_image_url || '';
    document.getElementById('player-bg-art').style.backgroundImage = `url(${imgUrl})`;

    document.getElementById('watch-anime-title').textContent = a.title;
    document.getElementById('watch-type-badge').textContent = a.type || 'أنمي';
    document.getElementById('watch-score').textContent = a.score ? `★ ${a.score}` : '';

    // === LOAD EPISODES LIST FIRST ===
    const totalEp = a.episodes || 12;
    const epList = document.getElementById('ep-list');
    const mobileEpList = document.getElementById('mobile-ep-list');
    
    if (epList) {
      document.getElementById('ep-count-badge').textContent = `${toArabicNum(totalEp)} حلقة`;
      
      // Build episodes list (will try to fetch titles from API)
      const epItemsHtml = Array.from({length: Math.min(totalEp, 50)}, (_, i) => {
        const n = i + 1;
        const title = `الحلقة ${toArabicNum(n)}`;
        const isActive = n === ep;
        return `
          <div class="ep-item${isActive ? ' active' : ''}" data-ep="${n}" onclick="switchEp(${n})" style="display: flex !important; flex-direction: row-reverse;">
            <div class="ep-num">${n}</div>
            <div class="ep-thumb">
              <img src="${imgUrl}" alt="حلقة ${n}" loading="lazy" />
              <div class="ep-playing-indicator">
                <div class="ep-playing-bars">
                  <span></span><span></span><span></span><span></span>
                </div>
              </div>
            </div>
            <div class="ep-details">
              <div class="ep-title">${esc(title)}</div>
              <div class="ep-duration">٢٤ دقيقة</div>
            </div>
          </div>`;
      }).join('');

      epList.innerHTML = epItemsHtml;
      if (mobileEpList) mobileEpList.innerHTML = epItemsHtml;

      // Activate episodes tab
      document.querySelectorAll('.mobile-tab').forEach((b, i) => b.classList.toggle('active', i === 0));
      document.querySelectorAll('.mobile-panel').forEach(p => p.classList.toggle('active', p.id === 'mobile-panel-episodes'));

      // Scroll to active episode
      requestAnimationFrame(() => {
        document.querySelectorAll('.ep-item.active').forEach(active => active.scrollIntoView({ block: 'nearest' }));
      });
    }

    // === LOAD VIDEO PLAYER ===
    const playerShell = document.querySelector('.player-shell');
    if (playerShell) {
      playerShell.innerHTML = `
        <div class="throbber-wrap">
          <div class="throbber">
            <div class="throbber-ring"></div>
            <div class="throbber-ring"></div>
            <div class="throbber-ring"></div>
            <div class="throbber-dot"></div>
          </div>
          <div class="throbber-status" id="throbber-status">جارٍ تحميل الحلقة ${toArabicNum(ep)}...</div>
        </div>`;

      loadEpisodeStream(ep, a);
    }

    loadSuggestions(a.mal_id);
  }

  async function loadEpisodeStream(ep, a) {
    const playerShell = document.querySelector('.player-shell');
    if (!playerShell) return;

    try {
      console.log('🔍 Searching anime for:', a.title_english || a.title);

      const titleSearch = a.title_english || a.title;
      
      // Use backend proxy server (much more reliable than client-side proxies)
      const backendUrl = `http://localhost:3000/api/anime/search?q=${encodeURIComponent(titleSearch)}`;
      // Or if deployed: const backendUrl = `https://your-server.com/api/anime/search?q=${encodeURIComponent(titleSearch)}`;
      
      console.log('📡 Calling backend proxy...');
      const searchRes = await fetch(backendUrl);
      
      if (!searchRes.ok) {
        throw new Error(`Backend error: ${searchRes.status} ${searchRes.statusText}`);
      }
      
      const searchData = await searchRes.json();
      console.log('✅ Search results from backend:', searchData);
      
      if (!searchData.results || searchData.results.length === 0) {
        throw new Error('No anime found on 2embed');
      }

      const anime = searchData.results[0];
      const animeId = anime.id || anime.mal_id;
      
      console.log('✅ Found anime ID:', animeId, 'Title:', anime.title);

      // Create iframe embed
      const iframeSrc = `https://www.2embed.cc/embedanime/${animeId}/${ep}`;
      
      console.log('🎬 Loading embed URL:', iframeSrc);

      // Load iframe player
      playerShell.innerHTML = `
        <iframe 
          src="${iframeSrc}" 
          width="100%" 
          height="100%" 
          frameborder="0" 
          allowfullscreen 
          style="background:#000;">
        </iframe>`;

    } catch (e) {
      console.error('🔴 Error:', e.message);
      console.error('💡 Make sure the backend server is running on port 3000');
      console.error('💡 Run: npm install && npm start');
      showPlayerFallback(a, ep);
    }
  }

  function showPlayerFallback(a, ep) {
    const playerShell = document.querySelector('.player-shell');
    if (!playerShell) return;
    
    const searchTitle = encodeURIComponent(a.title_english || a.title);
    
    playerShell.innerHTML = `
      <div style="width:100%; height:100%; background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(236,72,153,0.05)); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; font-family:'Cairo',sans-serif;">
        <p style="font-size:1.3rem; color:var(--text); margin-bottom:2rem; text-align:center;">🎬 الحلقات متاحة أدناه</p>
        <p style="color:var(--muted); font-size:0.95rem; margin-bottom:2rem; text-align:center; max-width:400px;">اختر الحلقة من القائمة، أو استخدم المواقع الخارجية:</p>
        <div style="display:flex; gap:0.75rem; flex-wrap:wrap; justify-content:center;">
          <a href="https://hianime.to/search?keyword=${searchTitle}" target="_blank" style="padding:0.6rem 1.2rem; background:var(--violet); color:#fff; border-radius:6px; text-decoration:none; font-size:0.9rem; font-weight:600;">HiAnime</a>
          <a href="https://www.gogoanime.run/?s=${searchTitle}" target="_blank" style="padding:0.6rem 1.2rem; background:var(--pink); color:#fff; border-radius:6px; text-decoration:none; font-size:0.9rem; font-weight:600;">GoGoAnime</a>
          <a href="https://www.animeworld.so/search/${searchTitle}" target="_blank" style="padding:0.6rem 1.2rem; background:var(--cyan); color:#000; border-radius:6px; text-decoration:none; font-size:0.9rem; font-weight:600;">AnimeWorld</a>
        </div>
      </div>`;
  }

  async function switchEp(n) {
    document.getElementById('watch-ep-badge').textContent = `الحلقة ${toArabicNum(n)}`;
    document.querySelectorAll('.ep-item').forEach(el => {
      el.classList.toggle('active', Number(el.dataset.ep) === n);
    });

    // Scroll to active episode
    requestAnimationFrame(() => {
      document.querySelectorAll('.ep-item.active').forEach(active => active.scrollIntoView({ block: 'nearest' }));
    });

    // Load new episode stream
    const a = currentAnimeData;
    const playerShell = document.querySelector('.player-shell');
    
    if (playerShell) {
      playerShell.innerHTML = `
        <div class="throbber-wrap">
          <div class="throbber">
            <div class="throbber-ring"></div>
            <div class="throbber-ring"></div>
            <div class="throbber-ring"></div>
            <div class="throbber-dot"></div>
          </div>
          <div class="throbber-status" id="throbber-status">جارٍ تحميل الحلقة ${toArabicNum(n)}...</div>
        </div>`;

      loadEpisodeStream(n, a);
    }
  }

  function setMobileTab(tab, btn) {
    document.querySelectorAll('.mobile-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.mobile-panel').forEach(p => p.classList.remove('active'));
    document.getElementById(`mobile-panel-${tab}`).classList.add('active');
  }

  async function loadSuggestions(id) {
    const descGrid = document.getElementById('suggestions-grid');
    const mobGrid = document.getElementById('mobile-suggestions-grid');
    const loadingHtml = `<div style="color:var(--muted);font-size:.78rem;padding:.5rem 0.25rem;">جارٍ التحميل...</div>`;
    descGrid.innerHTML = loadingHtml;
    mobGrid.innerHTML = loadingHtml;
    try {
      const res = await fetch(`${BASE}/anime/${id}/recommendations`);
      const json = await res.json();
      const list = (json.data || []).slice(0, 10).map(r => r.entry).filter(Boolean);
      if (!list.length) {
        const emptyHtml = `<div style="color:var(--muted);font-size:.78rem;padding:0 0.25rem;">لا توجد مقترحات.</div>`;
        descGrid.innerHTML = emptyHtml;
        mobGrid.innerHTML = emptyHtml;
        return;
      }
      const html = list.map(a => `
        <div class="suggestion-card" onclick="goToAnime(${a.mal_id})">
          <div class="suggestion-thumb">
            <img src="${a.images?.webp?.image_url || a.images?.jpg?.image_url || ''}" alt="${esc(a.title)}" loading="lazy" />
          </div>
          <div class="suggestion-info">
            <div class="suggestion-title" title="${esc(a.title)}">${esc(a.title)}</div>
          </div>
        </div>`).join('');
      descGrid.innerHTML = html;
      mobGrid.innerHTML = html;
    } catch(e) {
      const errHtml = `<div style="color:var(--muted);font-size:.78rem;padding:0 0.25rem;">تعذّر تحميل المقترحات.</div>`;
      descGrid.innerHTML = errHtml;
      mobGrid.innerHTML = errHtml;
    }
  }

  async function goToAnime(id) {
    try {
      const res = await fetch(`${BASE}/anime/${id}`);
      const json = await res.json();
      currentAnimeData = json.data;
      openWatch(1);
    } catch(e) {}
  }

  function closeWatch() {
    clearInterval(statusInterval);
    document.getElementById('watch-page').classList.remove('open');
    document.querySelector('header').style.display = '';
    document.querySelector('.hero').style.display = '';
    document.querySelector('main.section').style.display = '';
    document.querySelector('footer').style.display = '';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modal-backdrop')) closeModalDirect();
  }
  function closeModalDirect() {
    document.getElementById('modal-backdrop').classList.remove('open');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

  function setSection(section, btn) {
    currentSection = section;
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const [label, pill] = labels[section];
    document.getElementById('section-label').textContent = label;
    document.getElementById('section-pill').textContent = pill;
    fetchAnime(section);
  }

  function filterType(type, btn) {
    currentType = type;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchAnime(currentSection);
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doSearch();
  });

  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { fetchAnime(currentSection); return; }

    const grid = document.getElementById('anime-grid');
    document.getElementById('section-label').textContent = `نتائج البحث عن "${q}"`;
    document.getElementById('section-pill').textContent = 'بحث';
    grid.innerHTML = skeleton();

    try {
      const url = `${BASE}/anime?q=${encodeURIComponent(q)}&limit=24${currentType ? `&type=${currentType}` : ''}`;
      const res = await fetch(url);
      const json = await res.json();
      renderCards(json.data || []);
    } catch(e) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚡</div><p>فشل البحث. حاول مرة أخرى.</p></div>`;
    }
  }

  fetchAnime('trending');
</script>
</body>
</html>
